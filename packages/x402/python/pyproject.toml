[project]
name = "libertai-x402"
version = "0.1.0"
description = "x402 utils to use LibertAI services"
authors = [{ name = "LibertAI.io team", email = "hello@libertai.io" }]
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = ["eth-account>=0.13.0", "httpx>=0.27.0"]

[project.urls]
Homepage = "https://libertai.io"
Repository = "https://github.com/LibertAI/libertai-agents"

[tool.poetry.group.dev.dependencies]
mypy = "^1.11.0"
ruff = "^0.6.0"

[build-system]
requires = ["poetry-core>=2.0"]
build-backend = "poetry.core.masonry.api"
