name: AgentKit Plugin CI

on:
  push:
    paths:
      - packages/agentkit-plugin/**
  pull_request:
    paths:
      - packages/agentkit-plugin/**

jobs:
  agentkit-plugin-ts-ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agentkit-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: packages/agentkit-plugin/.nvmrc
          cache: npm
          cache-dependency-path: packages/agentkit-plugin/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
