name: x402 CI

on:
  push:
    paths:
      - packages/x402/**
  pull_request:
    paths:
      - packages/x402/**

jobs:
  x402-ts-ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/x402
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: packages/x402/.nvmrc
          cache: npm
          cache-dependency-path: packages/x402/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
