name: Publish x402 to npm

on:
  workflow_dispatch:

jobs:
  x402-npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/x402/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: packages/x402/typescript/.nvmrc
          cache: npm
          cache-dependency-path: packages/x402/typescript/package-lock.json
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      - run: npm publish --provenance --access public
